<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>ShopX — ช้อปปิ้งออนไลน์</title>
    <meta name="description" content="ShopX - แพลตฟอร์มช้อปปิ้งออนไลน์ สินค้าหลากหลาย ราคาดี ส่งถึงบ้าน" />
    <meta name="keywords" content="shopx, ช้อปปิ้งออนไลน์, สินค้าออนไลน์, e-commerce" />
    <meta name="author" content="ShopX" />
    <meta name="theme-color" content="#ff9800" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon stack — all browsers covered -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ShopX" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ShopX" />
    <meta property="og:title" content="ShopX — ช้อปปิ้งออนไลน์" />
    <meta property="og:description" content="แพลตฟอร์มช้อปปิ้งออนไลน์ สินค้าหลากหลาย ราคาดี" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShopX — ช้อปปิ้งออนไลน์" />
    <meta name="twitter:description" content="แพลตฟอร์มช้อปปิ้งออนไลน์ สินค้าหลากหลาย" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Preconnect to fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Splash screen color for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
      /* Prevent flash of unstyled content */
      html { visibility: hidden; }
      html.ready { visibility: visible; }

      /* Loading skeleton while React boots */
      #root:empty::before {
        content: '';
        display: block;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 9999;
      }
      #root:empty::after {
        content: '';
        display: block;
        position: fixed;
        top: 50%;
        left: 50%;
        width: 48px;
        height: 48px;
        margin: -24px 0 0 -24px;
        border: 4px solid #ff980033;
        border-top-color: #ff9800;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        z-index: 10000;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        #root:empty::before { background: #111; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Mark html as ready to prevent FOUC
      document.documentElement.classList.add('ready');
      // Respect saved dark mode preference
      const dark = localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
