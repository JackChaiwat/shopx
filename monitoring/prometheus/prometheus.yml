global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: shopx

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: shopx-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: nginx
    static_configs:
      - targets: ["nginx:80"]
    metrics_path: /nginx-health

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
